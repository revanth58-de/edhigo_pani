# ─────────────────────────────────────────────────────────────────────────────
# Deploy — Backend to Google Cloud Run
# Triggers automatically when CI passes on a merge to `main`.
#
# Flow:
#   1. Build a Docker image for the backend
#   2. Push to Google Artifact Registry (GAR)
#   3. Deploy to Cloud Run (zero-downtime rolling update)
#   4. Run `prisma migrate deploy` against production DB
#   5. Verify the /health endpoint responds 200
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID           → your GCP project ID (e.g. dinasari-prod)
#   GCP_SA_KEY               → base64-encoded Service Account JSON key
#                              (needs roles: Cloud Run Admin, Artifact Registry Writer, Storage Admin)
#   DATABASE_URL             → production Neon PostgreSQL URL
#   JWT_SECRET               → production JWT secret
#   JWT_REFRESH_SECRET       → production JWT refresh secret
#   ADMIN_JWT_SECRET         → production admin JWT secret
#   CLOUD_RUN_SERVICE_NAME   → e.g. dinasari-backend
#   CLOUD_RUN_REGION         → e.g. asia-south1
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'Dockerfile'

  # Allow manual trigger with a reason label
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual hotfix'

# Only one deploy can run at a time — never race two deploys
concurrency:
  group: deploy-backend
  cancel-in-progress: false   # Never cancel an in-progress deploy

env:
  GAR_LOCATION: asia-south1
  IMAGE_NAME: dinasari-backend
  NODE_VERSION: '20'

jobs:
  # ── CI gate — must pass before deploy starts ─────────────────────────────────
  ci-gate:
    name: CI Gate (tests must pass)
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production    # Requires manual approval in GitHub if configured

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build \
            --file backend/Dockerfile \
            --tag "$IMAGE_TAG" \
            --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:latest" \
            backend/
          docker push "$IMAGE_TAG"
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:latest"

      - name: Run Prisma migrations
        # Run migrate deploy (not db push) in production to preserve migration history
        run: |
          cd backend
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE_NAME }}
          region: ${{ secrets.CLOUD_RUN_REGION }}
          image: ${{ env.IMAGE_TAG }}
          env_vars: |
            NODE_ENV=production
            PORT=8080
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            JWT_SECRET=JWT_SECRET:latest
            JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
            ADMIN_JWT_SECRET=ADMIN_JWT_SECRET:latest

      - name: Verify health check
        run: |
          HEALTH_URL="${{ steps.deploy.outputs.url }}/health"
          echo "Checking $HEALTH_URL ..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Notify deploy URL
        if: success()
        run: |
          echo "🚀 Deployed successfully!"
          echo "URL: ${{ steps.deploy.outputs.url }}"
          echo "Image: ${{ env.IMAGE_TAG }}"
          echo "Triggered by: ${{ github.actor }} (${{ github.event.inputs.reason || 'auto-deploy from main merge' }})"
