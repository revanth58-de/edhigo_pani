<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edhigo Pani — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">🌾</div>
      <div>
        <div class="sidebar-title">Edhigo Pani</div>
        <div class="sidebar-badge">ADMIN</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" data-page="stats">
        <span class="nav-item-icon">📊</span> Dashboard
      </div>

      <div class="nav-section-label">Manage</div>
      <div class="nav-item" data-page="users">
        <span class="nav-item-icon">👥</span> Users
      </div>
      <div class="nav-item" data-page="jobs">
        <span class="nav-item-icon">💼</span> Jobs
      </div>
      <div class="nav-item" data-page="payments">
        <span class="nav-item-icon">💳</span> Payments
      </div>
      <div class="nav-item" data-page="groups">
        <span class="nav-item-icon">🫂</span> Groups
      </div>

      <div class="nav-section-label">Records</div>
      <div class="nav-item" data-page="attendance">
        <span class="nav-item-icon">📋</span> Attendance
      </div>
      <div class="nav-item" data-page="ratings">
        <span class="nav-item-icon">⭐</span> Ratings
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">🛡️</div>
        <div>
          <div class="admin-name">Administrator</div>
          <div class="admin-role">Super Admin</div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Logout">🚪</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-sub" id="topbarSub">Platform overview</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-dot"></div>
        <div class="topbar-time" id="topbarTime"></div>
        <button class="refresh-btn" id="refreshBtn" title="Refresh">🔄</button>
      </div>
    </header>

    <main class="content">
      <div id="page-stats"  class="page active"></div>
      <div id="page-users"  class="page"></div>
      <div id="page-jobs"   class="page"></div>
      <div id="page-payments" class="page"></div>
      <div id="page-groups" class="page"></div>
      <div id="page-attendance" class="page"></div>
      <div id="page-ratings" class="page"></div>
    </main>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="editUserModal">
  <div class="modal">
    <div class="modal-title">Edit User</div>
    <div class="modal-sub" id="editUserSubtitle"></div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="editUserName" />
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input filter-select" id="editUserRole" style="width:100%">
        <option value="farmer">Farmer</option>
        <option value="worker">Worker</option>
        <option value="leader">Leader</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input filter-select" id="editUserStatus" style="width:100%">
        <option value="active">Active</option>
        <option value="suspended">Suspended</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Village</label>
      <input class="form-input" id="editUserVillage" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="editUserCancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="editUserSave">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
  import { guardAuth, clearSession } from './auth.js';
  import { loadStats }      from './pages/stats.js';
  import { loadUsers }      from './pages/users.js';
  import { loadJobs }       from './pages/jobs.js';
  import { loadPayments }   from './pages/payments.js';
  import { loadGroups }     from './pages/groups.js';
  import { loadAttendance } from './pages/attendance.js';
  import { loadRatings }    from './pages/ratings.js';

  guardAuth();

  const pages = {
    stats:      { load: loadStats,      title: 'Dashboard',  sub: 'Platform overview' },
    users:      { load: loadUsers,      title: 'Users',      sub: 'Manage platform users' },
    jobs:       { load: loadJobs,       title: 'Jobs',       sub: 'View and manage all jobs' },
    payments:   { load: loadPayments,   title: 'Payments',   sub: 'Track and update payments' },
    groups:     { load: loadGroups,     title: 'Groups',     sub: 'View worker groups' },
    attendance: { load: loadAttendance, title: 'Attendance', sub: 'Check-in/out records' },
    ratings:    { load: loadRatings,    title: 'Ratings',    sub: 'User reviews and ratings' },
  };

  let currentPage = 'stats';

  function navigate(page) {
    if (!pages[page]) return;
    currentPage = page;

    // Update sidebar
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`)?.classList.add('active');

    // Update topbar
    document.getElementById('topbarTitle').textContent = pages[page].title;
    document.getElementById('topbarSub').textContent = pages[page].sub;

    // Show page
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');

    pages[page].load();
  }

  // Sidebar nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.page));
  });

  // Refresh
  document.getElementById('refreshBtn').addEventListener('click', () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    pages[currentPage].load().finally(() => {
      setTimeout(() => btn.classList.remove('spinning'), 500);
    });
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', () => {
    clearSession();
    window.location.href = 'index.html';
  });

  // Clock
  function updateClock() {
    document.getElementById('topbarTime').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 60000);

  // Toast helper
  window.showToast = (msg, type = 'success') => {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  };

  // Load initial page
  navigate('stats');
</script>
</body>
</html>
