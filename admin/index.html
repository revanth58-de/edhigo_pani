<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edhigo Pani — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🌾</div>
      <div>
        <div class="login-logo-text">Edhigo Pani</div>
        <div class="login-logo-sub">Admin Dashboard</div>
      </div>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to manage the platform</p>

    <div class="login-error" id="loginError">Invalid credentials or server unreachable.</div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="backendUrl">Backend URL</label>
        <input class="form-input" type="url" id="backendUrl" placeholder="http://10.123.19.85:5000" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="adminSecret">Admin Secret Key</label>
        <input class="form-input" type="password" id="adminSecret" placeholder="Enter your admin secret" required />
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
        <span class="spinner" id="loginSpinner" style="display:none"></span>
      </button>
    </form>
  </div>
</div>

<script type="module">
  import { saveSession, isLoggedIn } from './auth.js';

  if (isLoggedIn()) window.location.href = 'dashboard.html';

  const savedUrl = localStorage.getItem('admin_last_url') || 'http://localhost:5000';
  document.getElementById('backendUrl').value = savedUrl;

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
    const secret = document.getElementById('adminSecret').value.trim();
    const errEl = document.getElementById('loginError');
    const spinner = document.getElementById('loginSpinner');
    const btnText = document.getElementById('loginBtnText');

    errEl.style.display = 'none';
    spinner.style.display = 'inline-block';
    btnText.textContent = 'Signing in...';

    try {
      const res = await fetch(`${url}/api/admin/stats`, {
        headers: { 'x-admin-secret': secret }
      });
      if (!res.ok) throw new Error('Invalid credentials');
      saveSession(secret, url);
      localStorage.setItem('admin_last_url', url);
      window.location.href = 'dashboard.html';
    } catch {
      errEl.style.display = 'block';
    } finally {
      spinner.style.display = 'none';
      btnText.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
